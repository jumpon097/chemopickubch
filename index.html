<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173f5f">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="description" content="ระบบยืนยันการรับ–คืนยา AYA สำหรับหอผู้ป่วย">
  <title>AYA Ward Pickup</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="64x64" href="./icons/favicon-64.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <header class="appbar">
      <div class="identity">
        <img src="./icons/icon-192.png" alt="โลโก้โรงพยาบาลมะเร็งอุบลราชธานี">
        <div>
          <strong>AYA Ward Pickup</strong>
          <span id="connectionStatus" class="status online">ออนไลน์</span>
        </div>
      </div>
      <div class="toolbar">
        <button id="installButton" class="button install" type="button" hidden>ติดตั้ง</button>
        <button id="reloadButton" class="button" type="button" aria-label="โหลดแอปใหม่">รีเฟรช</button>
        <a id="directLink" class="button outline" href="#" target="_blank" rel="noopener">เปิดตรง</a>
      </div>
    </header>

    <main class="appframe-wrap">
      <div id="loader" class="loader" role="status">
        <img src="./icons/icon-192.png" alt="">
        <div class="spinner"></div>
        <strong>กำลังเปิดระบบ AYA…</strong>
        <span>ต้องเชื่อมต่ออินเทอร์เน็ตเพื่อรับ–คืนยา</span>
      </div>

      <div id="frameError" class="frame-error" hidden>
        <img src="./icons/icon-192.png" alt="">
        <h1>เปิดระบบในกรอบไม่สำเร็จ</h1>
        <p>ตรวจสอบอินเทอร์เน็ต หรือกดปุ่มด้านล่างเพื่อเปิด GAS Web App โดยตรง</p>
        <a id="errorDirectLink" class="primary-link" href="#" target="_blank" rel="noopener">เปิด AYA Ward Pickup</a>
      </div>

      <iframe
        id="ayaFrame"
        title="AYA Ward Pickup Web App"
        allow="camera; clipboard-read; clipboard-write"
        referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </main>
  </div>

  <noscript>กรุณาเปิด JavaScript เพื่อใช้งาน AYA Ward Pickup</noscript>
  <script src="./config.js"></script>
  <script src="./main.js"></script>
</body>
</html>
